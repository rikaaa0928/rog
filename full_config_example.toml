# 完整的项目配置样例

# 监听器配置
[[listener]]
name = "socks5_inbound"
endpoint = "127.0.0.1:1080"
proto = "socks5"
router = "main_router" # 引用下面定义的路由器

# 连接器配置
[[connector]]
name = "direct"
proto = "tcp"
# endpoint = "example.com:80" # 可选，如果需要固定连接到某个端点

[[connector]]
name = "proxy_outbound"
proto = "socks5"
endpoint = "127.0.0.1:1081" # 代理服务器地址

# pb_http 服务端：rog 本身监听 h2c，前置 proxy 可负责 TLS/HTTP2/HTTP3 后转发到这里
